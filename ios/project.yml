        'TENX_AUTH_BASE_URL': 'https://prv-7def2cc9aa054396.preview.10x.app/auth'
        'TENX_DATA_API_URL': 'https://ep-dawn-meadow-aty52if3.apirest.c-9.us-east-1.aws.neon.tech/neondb/rest/v1'
        'TENX_PROJECT_API_URL': 'https://prv-7def2cc9aa054396.preview.10x.app'
        'TENX_READY_AUTH_METHODS': 'emailPassword'
        'TENX_STORAGE_BASE_URL': 'https://prv-7def2cc9aa054396.preview.10x.app/storage'